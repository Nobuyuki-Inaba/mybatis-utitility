<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Rounded background panel -->
  <rect x="0.5" y="0.5" width="15" height="15" rx="2.5" fill="currentColor" opacity="0.18"/>
  <!-- "MB" — font-size 8 fills roughly half the 16px height, readable at activity-bar size -->
  <text x="8" y="11.2"
        text-anchor="middle"
        font-family="Arial,'Helvetica Neue',sans-serif"
        font-size="8"
        font-weight="900"
        fill="currentColor">MB</text>
  <!-- Small database dots at bottom to hint at DB tool -->
  <circle cx="5.5" cy="14" r="0.9" fill="currentColor" opacity="0.7"/>
  <circle cx="8"   cy="14" r="0.9" fill="currentColor" opacity="0.7"/>
  <circle cx="10.5" cy="14" r="0.9" fill="currentColor" opacity="0.7"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Border rectangle -->
  <rect x="0.5" y="0.5" width="15" height="15" rx="2" fill="none"
        stroke="currentColor" stroke-width="1.2" opacity="0.9"/>
  <!-- "MB" label -->
  <text x="8" y="8.5"
        text-anchor="middle" dominant-baseline="middle"
        font-family="Arial,'Helvetica Neue',sans-serif"
        font-size="6.5" font-weight="900"
        fill="currentColor">MB</text>
  <!-- "Utility" hint — smaller text at bottom -->
  <text x="8" y="13.5"
        text-anchor="middle" dominant-baseline="middle"
        font-family="Arial,'Helvetica Neue',sans-serif"
        font-size="3.5" font-weight="700" letter-spacing="0.3"
        fill="currentColor" opacity="0.8">Utility</text>
</svg>
